version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=4096"
        - npm ci
    build:
      commands:
        # not-foundページを完全に削除して新規作成
        - rm -rf src/app/not-found.*
        - echo 'function NotFound() { return <div className="text-center p-12"><h1 className="text-xl font-bold">ページが見つかりません</h1><a href="/" className="text-blue-500 mt-4 block">トップページへ</a></div> }; export default NotFound;' > src/app/not-found.js
        # 環境変数を設定
        - export NEXT_DISABLE_PRERENDER=true
        - export NEXT_PUBLIC_SKIP_404_PRERENDER=true
        # buildの実行
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*