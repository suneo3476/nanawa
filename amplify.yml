version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=4096"
        - npm ci
    build:
      commands:
        # 全てのルートファイルを作成し直す
        - rm -rf src/app/not-found.* src/app/error.* src/app/loading.*
        - echo 'export default function NotFound() { return <div style={{textAlign:"center",padding:"2rem"}}><h1 style={{marginBottom:"1rem"}}>ページが見つかりません</h1><a href="/" style={{color:"blue"}}>トップページへ戻る</a></div>; }' > src/app/not-found.js
        - echo 'export default function Loading() { return <div>Loading...</div>; }' > src/app/loading.js
        - echo '"use client"; export default function Error({error, reset}) { return <div><h2>エラーが発生しました</h2><button onClick={() => reset()}>再試行</button></div>; }' > src/app/error.js
        
        # 一時ファイルで対応
        - mkdir -p .next/server/app/_not-found
        - echo 'export default function NotFound(){return null}' > .next/server/app/_not-found/page.js
        
        # 特殊な環境設定
        - NEXT_TELEMETRY_DISABLED=1 NEXT_SKIP_PRERENDER=1 NODE_ENV=production npm run build -- --no-lint
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*