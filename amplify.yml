# amplify.yml
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=4096"
        - npm ci
    build:
      commands:
        - node scripts/disable-dynamic-routes.js
        - npm run build
        - node scripts/restore-dynamic-routes.js
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*